<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Arquitectura del sistema multiagente de tickets de CS</title>
<desc>Un ticket entra vía el listener de Google Chat, el orquestador lo clasifica y escribe el contexto en session.state, delega a uno de 7 subagentes especializados, que consultan el servidor MCP propio (RAG sobre runbooks, código fuente y resoluciones) y le piden al usuario de CS un dato de consola cuando hace falta, hasta completar el diagnóstico.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: Helvetica, Arial, sans-serif; fill: #2C2C2A; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; fill: #5F5E5A; }
  .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
  .box-gray { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
  .box-purple { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
  .box-teal { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
  .box-amber { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
</style>

<rect x="140" y="40" width="400" height="56" rx="8" class="box-gray"/>
<text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">Ticket entrante</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">Google Chat (listener Python)</text>

<line x1="340" y1="96" x2="340" y2="136" class="arr" marker-end="url(#arrow)"/>

<rect x="140" y="136" width="400" height="56" rx="8" class="box-purple"/>
<text class="th" x="340" y="154" text-anchor="middle" dominant-baseline="central">root_agent (orquestador)</text>
<text class="ts" x="340" y="172" text-anchor="middle" dominant-baseline="central">clasifica y escribe session.state</text>

<text class="ts" x="360" y="212" dominant-baseline="central">transfer_to_agent</text>
<line x1="340" y1="192" x2="340" y2="232" class="arr" marker-end="url(#arrow)"/>

<rect x="90" y="232" width="300" height="56" rx="8" class="box-purple"/>
<text class="th" x="240" y="250" text-anchor="middle" dominant-baseline="central">7 subagentes</text>
<text class="ts" x="240" y="268" text-anchor="middle" dominant-baseline="central">especializados por dominio</text>

<rect x="410" y="232" width="220" height="56" rx="8" class="box-teal"/>
<text class="th" x="520" y="250" text-anchor="middle" dominant-baseline="central">Servidor MCP (RAG)</text>
<text class="ts" x="520" y="268" text-anchor="middle" dominant-baseline="central">runbooks + código + resoluciones</text>

<line x1="392" y1="260" x2="408" y2="260" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<text class="ts" x="180" y="308" dominant-baseline="central">pide dato de consola</text>
<line x1="300" y1="288" x2="300" y2="328" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="400" y="308" dominant-baseline="central">responde</text>
<line x1="380" y1="328" x2="380" y2="288" class="arr" marker-end="url(#arrow)"/>

<rect x="140" y="328" width="400" height="56" rx="8" class="box-amber"/>
<text class="th" x="340" y="346" text-anchor="middle" dominant-baseline="central">Usuario (equipo de CS)</text>
<text class="ts" x="340" y="364" text-anchor="middle" dominant-baseline="central">ejecuta en consola Rails de producción</text>

<rect x="70" y="410" width="10" height="10" rx="2" class="box-gray"/>
<text class="ts" x="86" y="415" dominant-baseline="central">Entrada</text>
<rect x="180" y="410" width="10" height="10" rx="2" class="box-purple"/>
<text class="ts" x="196" y="415" dominant-baseline="central">Agentes IA</text>
<rect x="300" y="410" width="10" height="10" rx="2" class="box-teal"/>
<text class="ts" x="316" y="415" dominant-baseline="central">Conocimiento (RAG)</text>
<rect x="460" y="410" width="10" height="10" rx="2" class="box-amber"/>
<text class="ts" x="476" y="415" dominant-baseline="central">Usuario</text>
</svg>
